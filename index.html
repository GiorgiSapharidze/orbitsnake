<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbit Snake</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #111214;
    gap: 12px;
    font-family: sans-serif;
  }
  canvas {
    background: #1a1b1e;
    border-radius: 16px;
    max-width: 92vw;
    touch-action: none;
  }
  footer {
    color: rgba(255,255,255,0.35);
    font-family: sans-serif;
    font-size: 13px;
    letter-spacing: 0.2px;
  }
  #leaderboard-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(13, 14, 16, 0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.1s ease;
    z-index: 999;
  }
  #leaderboard-overlay.active {
    opacity: 1;
    pointer-events: auto;
  }
  .lb-modal {
    background: #16171a;
    border: 1px solid #2a2c33;
    border-radius: 4px;
    width: 200px;
    padding: 24px;
    color: #ececed;
    text-align: center;
  }
  .lb-title {
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.35);
    margin: 0 0 16px 0;
    font-weight: 600;
  }
  .lb-list {
    margin-bottom: 10px;
  }
  .lb-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 4px;
    font-size: 14px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .lb-row:last-child {
    border-bottom: none;
  }
  .lb-rank {
    color: rgba(255,255,255,0.3);
    margin-right: 6px;
  }
  .lb-name-wrapper {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .lb-name {
    font-weight: 600;
    text-transform: uppercase;
  }
  .lb-badge {
    font-size: 10px;
    font-weight: 900;
    padding: 2px 3px;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 1px;
    line-height: 1;
  }
  .lb-badge.creator {
    background: #184a1071;
    color: rgb(152, 205, 138);
  }
  .lb-badge.yt {
    background: rgb(255, 249, 246);
    color: #ff2b01;
    border: 1px solid rgba(224, 85, 58, 0.3);
  }
  .lb-badge.staff {
    background: rgb(255, 249, 246);
    color: #f1c40f;
    border: 1px solid rgba(241, 196, 15, 0.3);
  }
  .lb-val {
    color: #2bbf8f;
    font-weight: 600;
  }
  .lb-input-zone {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px dashed rgba(255,255,255,0.1);
  }
  .lb-input-label {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .lb-field-group {
    display: flex;
    gap: 8px;
    justify-content: center;
  }
  .lb-input {
    background: #202226;
    border: 1px solid #33363f;
    border-radius: 2px;
    color: #fff;
    font-size: 16px;
    font-weight: bold;
    text-transform: uppercase;
    text-align: center;
    width: 50px;
    padding: 8px;
    letter-spacing: 2px;
  }
  .lb-input:focus {
    outline: none;
    border-color: rgba(255,255,255,0.35);
  }
  .lb-btn {
    background: rgba(255,255,255,0.35);
    border: none;
    color: #fff;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    border-radius: 2px;
    cursor: pointer;
    text-transform: uppercase;
  }
  .lb-btn:hover {
    background: rgba(185, 184, 184, 0.35);
  }
  .lb-hint {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    margin-top: 16px;
  }
</style>
</head>
<body>

<canvas id="c" width="440" height="440"></canvas>
<footer>made with love by Gio</footer>

<div id="leaderboard-overlay">
  <div class="lb-modal">
    <div class="lb-title">Leaderboard</div>
    <div id="lb-list" class="lb-list">Loading runs...</div>
    
    <div id="lb-submit-zone" class="lb-input-zone" style="display: none;">
      <div class="lb-input-label">New High Score! Enter Initials</div>
      <div class="lb-field-group">
        <input type="text" id="lb-initials" class="lb-input" maxlength="3" placeholder="AAA" autocomplete="off">
        <button id="lb-submit-btn" class="lb-btn">Submit</button>
      </div>
    </div>
    <div class="lb-hint">Press SPACE to close and restart</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCLmSl69t7C0HNjRUDDL5BtfSUaN5EqNBs",
  authDomain: "orbitsnake-4d784.firebaseapp.com",
  projectId: "orbitsnake-4d784",
  storageBucket: "orbitsnake-4d784.firebasestorage.app",
  messagingSenderId: "421624885871",
  appId: "1:421624885871:web:93d1d772b405cb4e92139a",
  measurementId: "G-6D9PPZ61XF"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const scoresCol = collection(db, "leaderboard");

const overlay = document.getElementById('leaderboard-overlay');
const lbList = document.getElementById('lb-list');
const submitZone = document.getElementById('lb-submit-zone');
const initialsInput = document.getElementById('lb-initials');
const submitBtn = document.getElementById('lb-submit-btn');

let scoreSaved = false;

const BADGE_MAP = {
  'creator': '<span class="lb-badge creator">DEV</span>',
  'youtuber': '<span class="lb-badge yt">YT</span>',
  'staff': '<span class="lb-badge staff">STAFF</span>'
};

async function showLeaderboard(allowSubmit) {
  overlay.classList.add('active');
  submitZone.style.display = allowSubmit ? 'block' : 'none';
  if (allowSubmit) {
    initialsInput.value = '';
    initialsInput.focus();
  }
  
  try {
    const q = query(scoresCol, orderBy("score", "desc"), limit(5));
    const snap = await getDocs(q);
    if (snap.empty) {
      lbList.innerHTML = '<div style="color:rgba(255,255,255,0.4); font-size:13px;">No entries yet</div>';
      return;
    }
    let html = '';
    let rank = 1;
    snap.forEach(doc => {
      const d = doc.data();
      const cleanName = (d.name || '---').replace(/[&<>'"]/g, t => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[t]||t));
      
      let badgeHtml = '';
      if (d.role && BADGE_MAP[d.role.toLowerCase()]) {
        badgeHtml = BADGE_MAP[d.role.toLowerCase()];
      }

      html += `
        <div class="lb-row">
          <div class="lb-name-wrapper">
            <span class="lb-rank">#0${rank}</span>
            <span class="lb-name">${cleanName}</span>
            ${badgeHtml}
          </div>
          <span class="lb-val">${d.score}</span>
        </div>`;
      rank++;
    });
    lbList.innerHTML = html;
  } catch (e) {
    lbList.innerHTML = '<div style="color:#e0553a; font-size:13px;">Failed to load data</div>';
  }
}

submitBtn.addEventListener('click', submitScore);
initialsInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    submitScore();
    e.stopPropagation();
  }
  if (e.code === 'Space') {
    initialsInput.blur();
    reset();
    e.preventDefault();
  }
});

async function submitScore() {
  let val = initialsInput.value.trim().toUpperCase().substring(0, 3);
  if (!val) return;
  submitZone.style.display = 'none';
  lbList.innerHTML = '<div style="color:rgba(255,255,255,0.4); font-size:13px;">Saving run...</div>';
  try {
    await addDoc(scoresCol, {
      name: val,
      score: score,
      timestamp: new Date()
    });
  } catch(e) {
    console.error(e);
  }
  showLeaderboard(false);
}

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const cx=220, cy=220;
let angle=0, angularSpeed=0.028;
let radius=100, targetRadius=100;
const minR=40, baseMaxR=180, ringStep=20;
let maxR=baseMaxR;
let zoom=1, targetZoom=1;
let trail=[];
let trailLen=6;
let obstacles=[];
let foods=[];
let score=0;
let gameOver=false;
let frame=0;

function randRadius(){ return minR + Math.floor(Math.random()* ((maxR-minR)/ringStep)) * ringStep; }

function randFreeRadius(){
  const usedRings = obstacles.map(o=>o.r);
  const allRings = [];
  for(let r=minR;r<=maxR;r+=ringStep) allRings.push(r);
  const free = allRings.filter(r=>!usedRings.includes(r));
  if(free.length===0) return randRadius();
  return free[Math.floor(Math.random()*free.length)];
}

function spawnObstacle(){
  const r = randFreeRadius();
  const speed = (Math.random()<0.5?1:-1) * (0.006 + Math.random()*0.014);
  const a = Math.random()*Math.PI*2;
  const arc = 0.5 + Math.random()*0.5;
  obstacles.push({r, speed, a, arc});
}

function foodCountForScore(s){
  return 1 + Math.floor(s/4);
}

function occupiedFoodRings(){
  return foods.map(f=>f.r);
}

function spawnFood(){
  const usedRings = occupiedFoodRings();
  const allRings = [];
  for(let r=minR;r<=maxR;r+=ringStep) allRings.push(r);
  const free = allRings.filter(r=>!usedRings.includes(r));
  const r = free.length ? free[Math.floor(Math.random()*free.length)] : randRadius();
  foods.push({ r, a: Math.random()*Math.PI*2 });
}

function ensureFoodCount(){
  const needed = foodCountForScore(score);
  while(foods.length < needed) spawnFood();
}

function growRingsIfNeeded(){
  const targetMaxR = baseMaxR + Math.floor(score/3)*ringStep;
  if(targetMaxR > maxR){
    maxR = targetMaxR;
    spawnObstacle();
  }
  targetZoom = baseMaxR / maxR;
}

function reset(){
  angle=0; radius=100; targetRadius=100; trail=[]; score=0; gameOver=false; frame=0;
  maxR=baseMaxR; zoom=1; targetZoom=1; scoreSaved = false;
  overlay.classList.remove('active');
  obstacles=[];
  foods=[];
  for(let i=0;i<5;i++) spawnObstacle();
  ensureFoodCount();
}
reset();

function angleDist(a,b){
  let d = Math.abs(a-b) % (Math.PI*2);
  if(d>Math.PI) d = Math.PI*2 - d;
  return d;
}

function update(){
  if(gameOver) {
    if(!scoreSaved) {
      scoreSaved = true;
      showLeaderboard(score > 0);
    }
    return;
  }
  frame++;
  radius += (targetRadius-radius)*0.25;
  if(Math.abs(targetRadius-radius) < 0.5) radius = targetRadius;
  angle += angularSpeed;
  trail.unshift({a:angle, r:radius});
  if(trail.length>trailLen) trail.pop();

  zoom += (targetZoom-zoom)*0.06;

  obstacles.forEach(o=>{ o.a += o.speed; });
  if(frame%260===0 && obstacles.length<8+Math.floor(score/3)) spawnObstacle();

  obstacles.forEach(o=>{
    if(Math.abs(o.r-radius) < 12){
      if(angleDist(angle, o.a) < o.arc/2){ gameOver=true; }
    }
  });

  for(let i=foods.length-1;i>=0;i--){
    const f=foods[i];
    if(Math.abs(f.r-radius)<12 && angleDist(angle,f.a)<0.12){
      score++;
      trailLen += 3;
      foods.splice(i,1);
    }
  }
  growRingsIfNeeded();
  ensureFoodCount();
}

function draw(){
  ctx.clearRect(0,0,440,440);
  ctx.save();
  ctx.translate(cx,cy);
  ctx.scale(zoom,zoom);
  ctx.translate(-cx,-cy);

  for(let r=minR;r<=maxR;r+=ringStep){
    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,0.08)';
    ctx.lineWidth=1/zoom;
    ctx.stroke();
  }
  ctx.beginPath();
  ctx.arc(cx,cy,4,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.fill();

  obstacles.forEach(o=>{
    ctx.beginPath();
    ctx.arc(cx,cy,o.r, o.a-o.arc/2, o.a+o.arc/2);
    ctx.strokeStyle='#e0553a';
    ctx.lineWidth=6;
    ctx.lineCap='round';
    ctx.stroke();
  });

  foods.forEach(f=>{
    const fx=cx+Math.cos(f.a)*f.r, fy=cy+Math.sin(f.a)*f.r;
    ctx.beginPath();
    ctx.arc(fx,fy,7,0,Math.PI*2);
    ctx.fillStyle='#2bbf8f';
    ctx.fill();
  });

  if(trail.length>1){
    ctx.beginPath();
    trail.forEach((t,i)=>{
    const x=cx+Math.cos(t.a)*t.r, y=cy+Math.sin(t.a)*t.r;
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.strokeStyle='#4c9eed';
    ctx.lineWidth=7;
    ctx.lineCap='round';
    ctx.lineJoin='round';
    ctx.stroke();
  }

  const head=trail[0];
  if(head){
    const hx=cx+Math.cos(head.a)*head.r, hy=cy+Math.sin(head.a)*head.r;
    ctx.beginPath();
    ctx.arc(hx,hy,8,0,Math.PI*2);
    ctx.fillStyle='#7db8ee';
    ctx.fill();
  }

  ctx.restore();

  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.font='500 14px sans-serif';
  ctx.textAlign='left';
  ctx.fillText('score '+score, 14, 24);

  if(gameOver){
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.fillRect(0,0,440,440);
    ctx.fillStyle='#fff';
    ctx.font='500 20px sans-serif';
    ctx.textAlign='center';
    ctx.fillText('game over — score '+score, 220, 210);
    ctx.font='400 14px sans-serif';
    ctx.fillText('press space to restart', 220, 236);
  }
}

let lastTime = performance.now();
const timestep = 1000 / 60;
let accumulator = 0;

function loop(currentTime){
  accumulator += currentTime - lastTime;
  lastTime = currentTime;
  if(accumulator > 100) accumulator = 100;
  while(accumulator >= timestep){
    update();
    accumulator -= timestep;
  }
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function changeRadius(dir){
  targetRadius = Math.max(minR, Math.min(maxR, targetRadius + dir*ringStep));
}

window.addEventListener('keydown', (e)=>{
  if(e.key==='ArrowDown'){ changeRadius(-1); e.preventDefault(); }
  if(e.key==='ArrowUp'){ changeRadius(1); e.preventDefault(); }
  if(e.code==='Space'){ reset(); e.preventDefault(); }
});
</script>

</body>
</html>
